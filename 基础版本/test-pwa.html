<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#2e7d32">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="绿皮书">
  <meta name="description" content="记录绿皮火车旅行足迹的PWA应用">
  <meta name="mobile-web-app-capable" content="yes">
  
  <title>绿皮书 - PWA测试</title>
  
  <link rel="manifest" href="manifest.json">
  <link href="https://fonts.googleapis.com/icon?family=Material+Icons+Round" rel="stylesheet">
  
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #f5f5f5;
      color: #212121;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    
    .container {
      background: white;
      border-radius: 16px;
      padding: 32px;
      box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
      max-width: 500px;
      width: 100%;
      text-align: center;
    }
    
    .logo {
      font-size: 80px;
      margin-bottom: 24px;
    }
    
    h1 {
      font-size: 24px;
      font-weight: 600;
      margin-bottom: 16px;
      color: #2e7d32;
    }
    
    p {
      font-size: 16px;
      color: #757575;
      margin-bottom: 32px;
    }
    
    .install-btn {
      background: #4caf50;
      color: white;
      border: none;
      border-radius: 8px;
      padding: 12px 24px;
      font-size: 16px;
      font-weight: 500;
      cursor: pointer;
      transition: background-color 0.3s ease;
    }
    
    .install-btn:hover {
      background: #43a047;
    }
    
    .status {
      margin-top: 24px;
      font-size: 14px;
      color: #9e9e9e;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="logo">🚂</div>
    <h1>绿皮书 - 火车旅行日记</h1>
    <p>记录绿皮火车旅行足迹的PWA应用</p>
    <button class="install-btn" id="installBtn" style="display: none;">安装到主屏幕</button>
    <div class="status" id="status">正在检查PWA状态...</div>
  </div>

  <script>
    // 检查是否支持PWA
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('/service-worker.js')
          .then(registration => {
            console.log('Service Worker 注册成功:', registration.scope);
            document.getElementById('status').textContent = 'PWA 准备就绪，可以安装';
          })
          .catch(error => {
            console.error('Service Worker 注册失败:', error);
            document.getElementById('status').textContent = 'PWA 注册失败: ' + error.message;
          });
      });
    } else {
      document.getElementById('status').textContent = '您的浏览器不支持PWA';
    }

    // 处理安装事件
    let deferredPrompt;
    window.addEventListener('beforeinstallprompt', (e) => {
      e.preventDefault();
      deferredPrompt = e;
      document.getElementById('installBtn').style.display = 'block';
      document.getElementById('status').textContent = '点击按钮将应用安装到主屏幕';
    });

    document.getElementById('installBtn').addEventListener('click', async () => {
      if (!deferredPrompt) return;
      
      deferredPrompt.prompt();
      const { outcome } = await deferredPrompt.userChoice;
      console.log(`用户选择: ${outcome}`);
      deferredPrompt = null;
      document.getElementById('installBtn').style.display = 'none';
      document.getElementById('status').textContent = `安装 ${outcome === 'accepted' ? '成功' : '取消'}`;
    });
  </script>
</body>
</html>
